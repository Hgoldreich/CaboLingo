<html lang="en">
<head>

<style>
:root{--teal:#008c88;--teal2:#e6fbf8;--navy:#102b4c;--muted:#60708d;--line:#d9e3f0;--soft:#f4f8fc;--orange:#ff6b16;--purple:#7b42d9;--green:#19a64a;--red:#df2f35;--yellow:#ffc533;--bg:linear-gradient(135deg,#dffdf8 0%,#fffaf2 100%)}
*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--navy);font-weight:700}button,input,select{font:inherit}button{border:0;cursor:pointer}.app{max-width:1180px;margin:0 auto;padding:18px 18px 96px}.top{display:grid;grid-template-columns:1.1fr 1.5fr 1fr;gap:14px;align-items:center}.brand{display:flex;gap:12px;align-items:center}.palm{font-size:52px}.brand h1{margin:0;color:var(--teal);font-size:34px;line-height:.95}.brand p{margin:6px 0 0;color:var(--orange);letter-spacing:2px}.tabs{display:flex;gap:10px;flex-wrap:wrap}.tab{background:#eef4fb;border-radius:18px;padding:14px 18px;color:var(--navy)}.tab.active{background:white;outline:4px solid #d9fbf7;color:var(--teal)}.stats{display:flex;gap:10px;justify-content:flex-end}.stat{background:white;border:1px solid var(--line);border-radius:16px;padding:12px 18px;min-width:120px}.stat b{display:block;font-size:30px}.card{background:white;border:1px solid var(--line);border-radius:24px;padding:22px;box-shadow:0 8px 22px #1231  }.grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:18px}.title{font-size:28px;color:var(--teal);margin:0}.sub{color:var(--muted);font-size:19px}.mission{display:grid;gap:14px}.missionRow{display:flex;align-items:center;gap:14px;padding:14px;border-radius:16px;background:var(--soft)}.box{height:28px;width:28px;border-radius:8px;border:3px solid #9fb0c6;display:grid;place-items:center}.done .box{background:var(--green);border-color:var(--green);color:white}.primary{background:var(--teal);color:white;border-radius:16px;padding:16px 22px}.orange{background:var(--orange);color:white;border-radius:16px;padding:14px 18px}.ghost{background:#eef4fb;color:var(--navy);border-radius:14px;padding:12px 16px}.phrase{display:grid;grid-template-columns:56px 1fr auto;gap:16px;align-items:center;padding:16px;border:1px solid var(--line);border-radius:18px;margin:12px 0;background:white}.num{width:44px;height:44px;border-radius:50%;background:var(--teal);color:white;display:grid;place-items:center;font-size:20px}.spanish{font-size:24px}.english{color:var(--muted);font-size:18px}.pill{display:inline-block;background:#e8eef7;color:var(--muted);border-radius:20px;padding:4px 12px;font-size:14px}.actions{display:flex;gap:10px;align-items:center}.sound{width:52px;height:52px;border-radius:50%;background:#e9fbf8;border:3px solid #b4eee8}.person{display:grid;grid-template-columns:1fr 1fr;gap:8px}.person button{border-radius:14px;padding:10px 12px;background:#eef4fb;color:var(--navy)}.person button.on{background:#dff9e8;color:#088532}.both{background:#e9fff0!important;border-color:#bdebc9}.question{font-size:28px;margin:15px 0}.choice{width:100%;text-align:left;background:white;border:2px solid var(--line);border-radius:16px;padding:16px;margin:10px 0}.choice.selected{border-color:var(--purple);background:#f5efff}.choice.correct{border-color:var(--green);background:#eafff0}.choice.wrong{border-color:var(--red);background:#fff0f0}.score{float:right;background:#f0e8ff;color:var(--purple);padding:12px 24px;border-radius:18px;font-size:26px}.search{width:100%;border:2px solid var(--line);border-radius:18px;padding:16px;margin:14px 0;font-size:20px}.filters{display:flex;gap:10px;flex-wrap:wrap}.filter.active{background:var(--teal);color:white}.library{display:grid;grid-template-columns:1.6fr .9fr;gap:16px}.row{display:grid;grid-template-columns:50px 1fr 1fr 92px 92px;gap:10px;align-items:center;padding:13px;border-bottom:1px solid var(--line)}.check{border-radius:12px;background:#eef4fb;padding:9px;text-align:center}.check.on{background:#ddf9e8;color:#06963d}.detail{position:sticky;top:10px}.progressBar{height:14px;background:#e5edf6;border-radius:99px;overflow:hidden}.bar{height:100%;background:linear-gradient(90deg,var(--teal),var(--orange));width:0}.bottomNav{display:none}.smallCards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.mini{background:white;border:1px solid var(--line);border-radius:18px;padding:16px}.feed{max-height:260px;overflow:auto}.feed div{padding:10px;border-bottom:1px solid var(--line)}
@media(max-width:850px){.app{padding:12px 12px 86px}.top{grid-template-columns:1fr}.brand h1{font-size:30px}.tabs{display:none}.stats{justify-content:stretch}.stat{flex:1;min-width:0;padding:10px}.stat b{font-size:24px}.grid,.library{grid-template-columns:1fr}.card{padding:16px;border-radius:20px}.phrase{grid-template-columns:44px 1fr;gap:10px}.actions{grid-column:1/3;justify-content:space-between}.person{width:100%}.row{display:block;border:1px solid var(--line);border-radius:16px;margin:10px 0}.row>div{margin:6px 0}.headerRow{display:none}.smallCards{grid-template-columns:1fr}.detail{position:static}.bottomNav{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(5,1fr);z-index:5}.bottomNav button{padding:10px 4px;background:white;color:var(--navy);font-size:13px}.bottomNav button.active{color:var(--teal);background:#e9fbf8}.palm{font-size:42px}}
.hidden{display:none!important}
</style>
</head><body><div class="app">
<header class="top"><div class="brand"><div class="palm">🌴</div><div><h1>CaboLingo</h1><p>DINNER GAME 2.1</p></div></div><nav class="tabs" id="tabs"></nav><div class="stats"><div class="stat">Hilton<b id="hCount">0</b>mastered</div><div class="stat">Liz<b id="lCount">0</b>mastered</div><div class="stat">Together<b id="bCount">0</b>both</div></div></header>
<main id="view"></main></div><nav class="bottomNav" id="bottomNav"></nav>
<script>
/* Paste Firebase config here later. App works locally now. */
const firebaseConfig = null;
const courses=[{id:1,name:'Survival Cabo',tag:'greetings, basics, restaurants, hotel, help'}];
const phrases=[
['Hola.','Hello.','Greetings'],['Buenos días.','Good morning.','Greetings'],['Buenas tardes.','Good afternoon.','Greetings'],['Buenas noches.','Good evening/night.','Greetings'],['¿Cómo está?','How are you?','Greetings'],['Muy bien.','Very well.','Basics'],['Gracias.','Thank you.','Basics'],['Muchas gracias.','Thank you very much.','Basics'],['De nada.','You are welcome.','Basics'],['Por favor.','Please.','Basics'],['Sí.','Yes.','Basics'],['No.','No.','Basics'],['Perdón.','Excuse me.','Basics'],['Lo siento.','I am sorry.','Basics'],['No entiendo.','I do not understand.','Communication'],['¿Habla inglés?','Do you speak English?','Communication'],['Más despacio, por favor.','Slower, please.','Communication'],['Repita, por favor.','Please repeat.','Communication'],['¿Qué significa?','What does this mean?','Communication'],['Entiendo.','I understand.','Communication'],['¿Dónde está el baño?','Where is the bathroom?','Essential'],['¿Cuánto cuesta?','How much does it cost?','Shopping'],['La cuenta, por favor.','The check, please.','Restaurant'],['Agua, por favor.','Water, please.','Restaurant'],['Necesito ayuda.','I need help.','Help'],['Una mesa para dos, por favor.','A table for two, please.','Restaurant'],['Quisiera ordenar.','I would like to order.','Restaurant'],['Está delicioso.','It is delicious.','Restaurant'],['Sin hielo, por favor.','No ice, please.','Restaurant'],['Con hielo, por favor.','With ice, please.','Restaurant'],['Café, por favor.','Coffee, please.','Restaurant'],['La propina está incluida?','Is the tip included?','Restaurant'],['Soy alérgico a...','I am allergic to...','Restaurant'],['No picante, por favor.','Not spicy, please.','Restaurant'],['Muy picante.','Very spicy.','Restaurant'],['¿Dónde está...?','Where is...?','Directions'],['A la izquierda.','To the left.','Directions'],['A la derecha.','To the right.','Directions'],['Todo recto.','Straight ahead.','Directions'],['Cerca.','Close.','Directions'],['Lejos.','Far.','Directions'],['Necesito un taxi.','I need a taxi.','Travel'],['Al aeropuerto, por favor.','To the airport, please.','Travel'],['Al hotel, por favor.','To the hotel, please.','Travel'],['¿Cuánto tiempo toma?','How long does it take?','Travel'],['¿Puede esperar?','Can you wait?','Travel'],['Tengo una reservación.','I have a reservation.','Hotel'],['Mi nombre es Hilton.','My name is Hilton.','Hotel'],['Quisiera registrarme.','I would like to check in.','Hotel'],['La llave no funciona.','The key does not work.','Hotel'],['Necesito toallas.','I need towels.','Hotel'],['La habitación.','The room.','Hotel'],['El aire acondicionado.','The air conditioning.','Hotel'],['No hay agua caliente.','There is no hot water.','Hotel'],['¿Puede ayudarme?','Can you help me?','Help'],['Estoy perdido.','I am lost.','Help'],['Llame a un doctor.','Call a doctor.','Help'],['Es una emergencia.','It is an emergency.','Help'],['Me duele.','It hurts.','Help'],['Farmacia.','Pharmacy.','Help'],['Playa.','Beach.','Cabo'],['Sombrilla.','Umbrella.','Cabo'],['Protector solar.','Sunscreen.','Cabo'],['Piscina.','Pool.','Cabo'],['Relajarse.','To relax.','Cabo'],['Cerveza.','Beer.','Cabo'],['Vino.','Wine.','Cabo'],['Pescado.','Fish.','Cabo'],['Camarón.','Shrimp.','Cabo'],['Mariscos.','Seafood.','Cabo'],['La marina.','The marina.','Cabo'],['¿A qué hora sale el barco?','What time does the boat leave?','Marina'],['Queremos ir a pescar.','We want to go fishing.','Marina'],['Chaleco salvavidas.','Life jacket.','Marina'],['Mareo.','Seasickness.','Marina'],['Campo de golf.','Golf course.','Golf'],['Tee time.','Tee time.','Golf'],['Carrito de golf.','Golf cart.','Golf'],['Pelotas de golf.','Golf balls.','Golf'],['Estoy aprendiendo español.','I am learning Spanish.','Conversation'],['Hablo un poco de español.','I speak a little Spanish.','Conversation'],['¿Cómo se dice...?','How do you say...?','Conversation'],['Mucho gusto.','Nice to meet you.','Conversation'],['Nos vemos mañana.','See you tomorrow.','Conversation'],['Buenas noches, gracias.','Good night, thank you.','Conversation'],['¿Qué recomienda?','What do you recommend?','Restaurant'],['Quisiera esto.','I would like this.','Shopping'],['Solo estoy mirando.','I am just looking.','Shopping'],['Es muy caro.','It is very expensive.','Shopping'],['¿Aceptan tarjeta?','Do you accept card?','Shopping'],['En efectivo.','In cash.','Shopping'],['Recibo, por favor.','Receipt, please.','Shopping'],['La salida.','The exit.','Travel'],['La entrada.','The entrance.','Travel'],['Equipaje.','Luggage.','Travel'],['Pasaporte.','Passport.','Travel'],['Aduana.','Customs.','Travel'],['¿Dónde recojo mi equipaje?','Where do I pick up my luggage?','Travel'],['Gracias por su ayuda.','Thank you for your help.','Basics']
].map((p,i)=>({id:i+1,es:p[0],en:p[1],cat:p[2],course:1}));
let state=JSON.parse(localStorage.getItem('cabolingo2')||'{}');
state.progress=state.progress||{};state.night=state.night||1;state.tab=state.tab||'Tonight';state.quiz=state.quiz||null;state.feed=state.feed||[];state.streak=state.streak||0;
function save(){localStorage.setItem('cabolingo2',JSON.stringify(state));updateCounts();}
function pr(id){state.progress[id]=state.progress[id]||{h:false,l:false,miss:0,last:null};return state.progress[id]}
function setM(id,who,val){let p=pr(id);p[who]=val;p.last=new Date().toLocaleDateString();state.feed.unshift(`${who==='h'?'Hilton':'Liz'} ${val?'mastered':'unmarked'} “${phrases[id-1].es}”`);state.feed=state.feed.slice(0,40);save();render();}
function speak(t){try{speechSynthesis.cancel();let u=new SpeechSynthesisUtterance(t);u.lang='es-MX';speechSynthesis.speak(u)}catch(e){}}
function tonightPhrases(){let start=(state.night-1)*5;return phrases.slice(start,start+5)}
function counts(){let h=0,l=0,b=0;phrases.forEach(x=>{let p=pr(x.id);if(p.h)h++;if(p.l)l++;if(p.h&&p.l)b++});return{h,l,b}}
function updateCounts(){let c=counts();['h','l','b'].forEach(k=>document.getElementById(k+'Count')&&(document.getElementById(k+'Count').textContent=c[k]))}
const tabs=['Tonight','Library','Progress','Games','Settings'];function nav(){let html=tabs.map(t=>`<button class="tab ${state.tab===t?'active':''}" onclick="state.tab='${t}';save();render()">${icon(t)} ${t}</button>`).join('');document.getElementById('tabs').innerHTML=html;document.getElementById('bottomNav').innerHTML=html.replaceAll('tab','');}
function icon(t){return{Tonight:'🏠',Library:'📚',Progress:'🏆',Games:'🎮',Settings:'⚙️'}[t]}
function phraseCard(x){let p=pr(x.id),both=p.h&&p.l;return `<div class="phrase ${both?'both':''}"><div class="num">${x.id}</div><div><div class="spanish">${x.es}</div><div class="english">${x.en}</div><span class="pill">${x.cat}</span>${both?'<span class="pill" style="background:#dff9e8;color:#078b38;margin-left:6px">Mastered together</span>':''}</div><div class="actions"><button class="sound" onclick="speak('${x.es.replaceAll("'","\\'")}')">🔊</button><div class="person"><button class="${p.h?'on':''}" onclick="setM(${x.id},'h',${!p.h})">H ${p.h?'✓':'○'}</button><button class="${p.l?'on':''}" onclick="setM(${x.id},'l',${!p.l})">L ${p.l?'✓':'○'}</button></div></div></div>`}
function viewTonight(){let list=tonightPhrases();return `<div class="grid"><section class="card"><h2 class="title">🌙 Tonight • Night ${state.night} of 20</h2><p class="sub">Learn 5 phrases, quiz, review, then do a dinner challenge.</p><div class="mission"><div class="missionRow done"><div class="box">✓</div><div><b>1. Lesson</b><br><span class="sub">Hear and say each phrase.</span></div></div><div class="missionRow"><div class="box">2</div><div><b>2. Quiz</b><br><span class="sub">Only tonight's 5 phrases.</span></div></div><div class="missionRow"><div class="box">3</div><div><b>3. Dinner Challenge</b><br><span class="sub">Use one phrase out loud tonight.</span></div></div></div><button class="primary" onclick="state.tab='Tonight';document.getElementById('lessonBlock').scrollIntoView({behavior:'smooth'});save();render()">Start Tonight</button><button class="orange" onclick="startQuiz()">Take Quiz</button></section><section class="card"><h2 class="title">🏝 Course 1: Survival Cabo</h2><p class="sub">${courses[0].tag}</p><div class="smallCards"><div class="mini">Hilton<br><b style="font-size:34px">${counts().h}</b></div><div class="mini">Liz<br><b style="font-size:34px">${counts().l}</b></div><div class="mini">Together<br><b style="font-size:34px">${counts().b}</b></div></div><p class="sub">When you finish 100 phrases, press Keep Going to unlock the next 100.</p><button class="orange" onclick="alert('Next 100 course structure is ready. We can add phrases 101–200 next.')">Keep Going +100</button></section></div><section class="card" id="lessonBlock" style="margin-top:18px"><h2 class="title">📖 Lesson First</h2><p class="sub">Tap H or L when each of you knows the phrase. When both are checked, it is mastered together.</p>${list.map(phraseCard).join('')}<button class="primary" onclick="startQuiz()">I’m ready — start quiz →</button></section>`}
function startQuiz(){state.quiz={i:0,score:0,answers:[],phase:'q'};state.tab='Tonight';save();render();setTimeout(()=>document.getElementById('quizBlock')?.scrollIntoView({behavior:'smooth'}),50)}
function quizHtml(){let q=state.quiz;if(!q)return '';let list=tonightPhrases();if(q.i>=list.length){return resultsHtml()}let x=list[q.i];let opts=[x,...list.filter(z=>z.id!==x.id)].sort(()=>Math.random()-.5).slice(0,4);if(!q.opts||q.optsFor!==x.id){q.opts=opts.map(o=>o.id);q.optsFor=x.id;save()}opts=q.opts.map(id=>phrases[id-1]);let selected=q.selected;return `<section class="card" id="quizBlock" style="margin-top:18px"><div class="score">${q.score} / 5</div><h2 class="title">🏆 Quiz</h2><p class="sub">Question ${q.i+1} of 5</p><div class="question">How do you say: <br><b>${x.en}</b></div>${opts.map(o=>`<button class="choice ${selected===o.id?'selected':''}" onclick="state.quiz.selected=${o.id};save();render()">${o.es}</button>`).join('')}<button class="primary" onclick="checkAnswer()">Check Answer</button>${q.checked?whoGotIt(x):''}</section>`}
function checkAnswer(){let q=state.quiz,x=tonightPhrases()[q.i];q.checked=true;if(q.selected===x.id&&!q.wasScored){q.score++;q.wasScored=true}if(q.selected!==x.id)pr(x.id).miss++;save();render()}
function whoGotIt(x){let p=pr(x.id);return `<div style="margin-top:18px;padding:16px;background:var(--soft);border-radius:16px"><b>${state.quiz.selected===x.id?'✅ Correct!':'❌ Correct answer: '+x.es}</b><p>Who got this one right?</p><div class="person"><button class="${p.h?'on':''}" onclick="setM(${x.id},'h',${!p.h})">Hilton ${p.h?'✓':'○'}</button><button class="${p.l?'on':''}" onclick="setM(${x.id},'l',${!p.l})">Liz ${p.l?'✓':'○'}</button></div><button class="orange" style="margin-top:12px" onclick="nextQ()">Continue →</button></div>`}
function nextQ(){state.quiz.i++;state.quiz.selected=null;state.quiz.checked=false;state.quiz.wasScored=false;state.quiz.opts=null;save();render()}
function resultsHtml(){state.streak=Math.max(state.streak,1);let missed=tonightPhrases().filter(x=>pr(x.id).miss>0&&! (pr(x.id).h&&pr(x.id).l));return `<section class="card" id="quizBlock" style="margin-top:18px"><h2 class="title">🎉 Dinner Results</h2><div class="smallCards"><div class="mini">Score<br><b style="font-size:34px">${state.quiz.score}/5</b></div><div class="mini">Together<br><b style="font-size:34px">${counts().b}</b></div><div class="mini">Streak<br><b style="font-size:34px">${state.streak}</b></div></div><h3>🌴 Dinner Challenge</h3><p class="sub">Use one of tonight's phrases out loud before tomorrow: <b>${tonightPhrases()[0].es}</b></p>${missed.length?`<h3>Needs Review</h3>${missed.map(phraseCard).join('')}`:''}<button class="primary" onclick="state.quiz=null;state.night=Math.min(20,state.night+1);save();render()">Finish Tonight →</button></section>`}
function viewLibrary(){return `<section class="card"><h2 class="title">📚 Library</h2><input id="search" class="search" placeholder="Search bathroom, baño, check, water..." oninput="renderLibrary()"><div class="filters"><button class="ghost filter active" onclick="libFilter='all';renderLibrary()">All</button><button class="ghost filter" onclick="libFilter='learning';renderLibrary()">Still learning</button><button class="ghost filter" onclick="libFilter='both';renderLibrary()">Both mastered</button><button class="ghost filter" onclick="libFilter='h';renderLibrary()">Hilton</button><button class="ghost filter" onclick="libFilter='l';renderLibrary()">Liz</button></div><div class="library"><div id="libList"></div><div class="card detail" id="detail">Tap any phrase to see details.</div></div></section>`}
let libFilter='all';function renderLibrary(){let q=(document.getElementById('search')?.value||'').toLowerCase();let arr=phrases.filter(x=>{let p=pr(x.id);let match=(x.es+' '+x.en+' '+x.cat).toLowerCase().includes(q);let f=libFilter==='all'||(libFilter==='learning'&&!(p.h&&p.l))||(libFilter==='both'&&p.h&&p.l)||(libFilter==='h'&&p.h)||(libFilter==='l'&&p.l);return match&&f});document.querySelectorAll('.filter').forEach(b=>b.classList.toggle('active',b.textContent.toLowerCase().includes(libFilter)|| (libFilter==='all'&&b.textContent==='All')));document.getElementById('libList').innerHTML=arr.map(x=>{let p=pr(x.id);return `<div class="row" onclick="detail(${x.id})"><div>#${x.id}</div><div><b>${x.es}</b><br><span class="sub">${x.cat}</span></div><div>${x.en}</div><div class="check ${p.h?'on':''}" onclick="event.stopPropagation();setM(${x.id},'h',${!p.h})">H ${p.h?'✓':'○'}</div><div class="check ${p.l?'on':''}" onclick="event.stopPropagation();setM(${x.id},'l',${!p.l})">L ${p.l?'✓':'○'}</div></div>`}).join('')||'<p class="sub">No phrases found.</p>'}
function detail(id){let x=phrases[id-1],p=pr(id);document.getElementById('detail').innerHTML=`<h2>${x.es}</h2><h3>${x.en}</h3><button class="sound" onclick="speak('${x.es.replaceAll("'","\\'")}')">🔊</button><hr><p>Hilton: ${p.h?'✅ mastered':'○ learning'}</p><p>Liz: ${p.l?'✅ mastered':'○ learning'}</p><p>Both: ${p.h&&p.l?'✅ mastered together':'not yet'}</p><button class="primary" onclick="state.tab='Tonight';save();render()">Practice Again</button>`}
let progFilter='all';
function viewProgress(){let c=counts();return `<section class="card"><h2 class="title">📚 Library & Progress</h2><p class="sub">Every phrase has clear check marks for Hilton, Liz, and mastered together.</p><div class="grid" style="grid-template-columns:2fr 1fr"><div class="mini"><h3 style="margin:0;color:#075ed6">COURSE 1: SURVIVAL CABO (1-100)</h3><div class="progressBar" style="margin-top:10px"><div class="bar" style="width:${c.b}%"></div></div><p class="sub"><b>${c.b}</b> / 100 mastered together</p></div><div class="smallCards"><div class="mini">Hilton<br><b>${c.h}</b><br>Mastered</div><div class="mini">Together<br><b>${c.b}</b><br>Both</div><div class="mini">Liz<br><b>${c.l}</b><br>Mastered</div></div></div><input id="progSearch" class="search" placeholder="Search library: bathroom, baño, check, water..." oninput="renderProgressLibrary()"><div class="filters"><button class="ghost pfilter active" data-f="all" onclick="setProgFilter('all')">All</button><button class="ghost pfilter" data-f="learning" onclick="setProgFilter('learning')">Still learning</button><button class="ghost pfilter" data-f="both" onclick="setProgFilter('both')">Both mastered</button><button class="ghost pfilter" data-f="h" onclick="setProgFilter('h')">Hilton</button><button class="ghost pfilter" data-f="l" onclick="setProgFilter('l')">Liz</button></div><div style="margin:12px 0;color:var(--muted)"><span style="color:var(--green)">✅ Both mastered</span> &nbsp; <span style="color:#075ed6">🔵 Hilton mastered</span> &nbsp; <span style="color:#c22bdf">🟣 Liz mastered</span> &nbsp; ○ Not mastered</div><div class="library"><div><div class="row headerRow"><div>#</div><div>Spanish</div><div>English</div><div>Hilton</div><div>Liz</div></div><div id="progList"></div></div><div class="card detail" id="progDetail">Tap any phrase to see details here.</div></div></section>`}
function setProgFilter(f){progFilter=f;renderProgressLibrary()}
function renderProgressLibrary(){let q=(document.getElementById('progSearch')?.value||'').toLowerCase();document.querySelectorAll('.pfilter').forEach(b=>b.classList.toggle('active',b.dataset.f===progFilter));let arr=phrases.filter(x=>{let p=pr(x.id);let match=(x.es+' '+x.en+' '+x.cat).toLowerCase().includes(q);let f=progFilter==='all'||(progFilter==='learning'&&!(p.h&&p.l))||(progFilter==='both'&&p.h&&p.l)||(progFilter==='h'&&p.h)||(progFilter==='l'&&p.l);return match&&f});let el=document.getElementById('progList');if(!el)return;el.innerHTML=arr.map(x=>{let p=pr(x.id),both=p.h&&p.l;return `<div class="row ${both?'both':''}" onclick="progressDetail(${x.id})"><div>${x.id}</div><div><b>${x.es}</b><br><span class="sub" style="font-size:14px">Course 1 • ${x.cat}</span></div><div>${x.en}</div><div class="check ${p.h?'on':''}" onclick="event.stopPropagation();setM(${x.id},'h',${!p.h});renderProgressLibrary();progressDetail(${x.id})">${p.h?'✅':'○'}</div><div class="check ${p.l?'on':''}" onclick="event.stopPropagation();setM(${x.id},'l',${!p.l});renderProgressLibrary();progressDetail(${x.id})">${p.l?'✅':'○'}</div></div>`}).join('')||'<p class="sub">No phrases found.</p>'}
function progressDetail(id){let x=phrases[id-1],p=pr(id);document.getElementById('progDetail').innerHTML=`<h3>#${x.id} • Course 1 • ${x.cat}</h3><h2>${x.es}</h2><h3>${x.en}</h3><button class="sound" onclick="speak('${x.es.replaceAll("'","\\'")}')">🔊</button><hr><p><b>Hilton:</b> ${p.h?'✅ mastered':'○ learning'}</p><p><b>Liz:</b> ${p.l?'✅ mastered':'○ learning'}</p><p><b>Together:</b> ${p.h&&p.l?'✅ mastered together':'not yet'}</p><div class="person"><button class="${p.h?'on':''}" onclick="setM(${id},'h',${!p.h});render();state.tab='Progress';save();setTimeout(()=>{renderProgressLibrary();progressDetail(${id})},0)">Hilton ${p.h?'✓':'○'}</button><button class="${p.l?'on':''}" onclick="setM(${id},'l',${!p.l});render();state.tab='Progress';save();setTimeout(()=>{renderProgressLibrary();progressDetail(${id})},0)">Liz ${p.l?'✓':'○'}</button></div><button class="primary" style="margin-top:12px" onclick="state.tab='Tonight';save();render()">Practice this phrase</button>`}
function viewGames(){return `<section class="card"><h2 class="title">🎮 Games</h2><div class="grid"><button class="primary" onclick="startQuiz()">Speed Quiz</button><button class="orange" onclick="alert('Cabo Survivor: one person gives a Cabo scenario, the other answers in Spanish. Use the Library for phrases.')">Cabo Survivor</button></div></section>`}
function viewSettings(){return `<section class="card"><h2 class="title">⚙️ Settings</h2><p class="sub">Local-only until Firebase config is added.</p><button class="ghost" onclick="state.night=Math.max(1,state.night-1);save();render()">Previous Night</button> <button class="ghost" onclick="state.night=Math.min(20,state.night+1);save();render()">Next Night</button> <button class="orange" onclick="if(confirm('Reset all progress?')){localStorage.removeItem('cabolingo2');location.reload()}">Reset all</button><pre style="white-space:pre-wrap;background:#f5f8fc;padding:12px;border-radius:12px">Firebase: paste config at top. We can then add Firestore sync for both phones.</pre></section>`}
function render(){nav();updateCounts();let v=''; if(state.tab==='Tonight')v=viewTonight()+quizHtml(); if(state.tab==='Library')v=viewLibrary(); if(state.tab==='Progress')v=viewProgress(); if(state.tab==='Games')v=viewGames(); if(state.tab==='Settings')v=viewSettings(); document.getElementById('view').innerHTML=v; if(state.tab==='Library')renderLibrary(); if(state.tab==='Progress')renderProgressLibrary();}
render();
</script></body></html>
