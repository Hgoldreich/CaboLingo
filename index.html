<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CaboLingo</title>
<style>
:root { --teal:#00938f; --orange:#ff7a13; --navy:#092942; --muted:#607083; --line:#dfe8f0; --soft:#f7fbfb; --green:#18a83c; }
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;color:var(--navy);background:#fff}
button,input,select{font:inherit} button{cursor:pointer}
.app{max-width:1150px;margin:0 auto;padding:14px 14px 80px}
.header{display:grid;grid-template-columns:220px 1fr;gap:18px;align-items:start}
.logoCard{border:1px solid var(--line);border-radius:24px;padding:16px;text-align:center;background:white;box-shadow:0 12px 30px #09294214}
.logoCard img{max-width:180px;width:100%;border-radius:16px}
.logoCard h1{color:var(--teal);font-size:32px;margin:5px 0 0}
.logoCard .script{font-family:cursive;color:var(--orange);font-size:28px;font-weight:900}
.top{border:1px solid var(--line);border-radius:24px;padding:18px;background:linear-gradient(135deg,#f5fffd,#fff);box-shadow:0 12px 30px #09294214}
.top h2{margin:0;font-size:28px}
.status{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}
.badge{border-radius:999px;background:#eef5f5;padding:8px 12px;font-weight:900;color:var(--muted)}
.badge.good{background:#e4fff1;color:#087a35} .badge.warn{background:#fff5dc;color:#956000}
.nav{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.nav button,.pill{border:0;border-radius:15px;background:#eef3f7;color:var(--navy);padding:11px 14px;font-weight:900}
.nav button.active,.pill.active{background:var(--teal);color:white}.pill.done{background:#18a83c;color:white}
.grid{display:grid;grid-template-columns:1fr 340px;gap:16px;margin-top:16px}
.card{border:1px solid var(--line);border-radius:22px;padding:18px;background:white;box-shadow:0 12px 30px #0929420d}
.row{display:grid;grid-template-columns:42px 1fr auto;gap:12px;align-items:center;border:1px solid var(--line);border-radius:17px;padding:12px;margin:10px 0;background:white}
.row.both{background:#edfff8;border-color:#9ae8dd}
.num{background:var(--teal);color:white;width:38px;height:38px;border-radius:50%;display:grid;place-items:center;font-weight:900}
.sp{font-size:22px;font-weight:900} .en{font-size:17px;color:var(--muted)} .small{color:var(--muted);font-weight:700}
.actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.round{width:48px;height:48px;border-radius:50%;border:2px solid #b6e8e1;background:#f3fffd;font-weight:900}
.round.on{background:#dffff0;border-color:#32c566;color:#08712d}
.primary{border:0;background:var(--teal);color:white;border-radius:15px;padding:13px 17px;font-weight:900}
.orange{background:var(--orange)} .danger{background:#e84343}
input,select{width:100%;border:2px solid var(--line);border-radius:15px;padding:12px;margin:6px 0 12px}
label{font-weight:900}
.setup{min-height:100vh;display:grid;place-items:center;padding:18px}
.setupInner{max-width:760px;width:100%;display:grid;grid-template-columns:260px 1fr;gap:20px;align-items:center}
.setupLogo{text-align:center} .setupLogo img{max-width:230px;width:100%;border-radius:18px}
.progress{height:12px;background:#e9eef3;border-radius:999px;overflow:hidden;margin:8px 0 14px} .fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--orange))}
table{width:100%;border-collapse:collapse} th,td{padding:9px;border-bottom:1px solid var(--line);text-align:left} th{font-weight:900}
.choice{display:block;width:100%;text-align:left;border:2px solid var(--line);border-radius:15px;background:#fff;padding:14px;margin:10px 0;font-weight:900}
.choice.correct{background:#e4fff1;border-color:#2fc866} .choice.wrong{background:#fff0f0;border-color:#ee7777}
.bottom{display:none}
@media(max-width:850px){
 .app{padding:10px 10px 80px} .header,.grid,.setupInner{grid-template-columns:1fr} .logoCard{display:none}
 .row{grid-template-columns:38px 1fr} .actions{grid-column:1/-1;justify-content:flex-start}
 .bottom{display:grid;position:fixed;left:0;right:0;bottom:0;background:white;border-top:1px solid var(--line);grid-template-columns:repeat(5,1fr);padding:6px;z-index:9}
 .bottom button{border:0;background:white;color:var(--muted);font-weight:900;font-size:11px} .bottom button.active{color:var(--teal)}
}

.gameHero{background:linear-gradient(135deg,#fff7e8,#effffd);border:1px solid var(--line);border-radius:24px;padding:20px;margin-bottom:14px}
.bigScore{font-size:52px;font-weight:900;color:var(--teal);line-height:1}
.timer{font-size:42px;font-weight:900;color:var(--orange)}
.gameChoice{display:block;width:100%;text-align:left;border:2px solid var(--line);border-radius:18px;padding:16px;margin:10px 0;background:white;font-weight:900}
.gameChoice:hover{border-color:var(--teal)}
.scoreboard{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:14px 0}
.scoreCard{border:1px solid var(--line);border-radius:18px;padding:16px;text-align:center;background:#fff}
.scoreCard.leading{background:#effff9;border-color:#9be8df}
.volleyCourt{background:linear-gradient(#fef2c6,#ffe7a5);border:3px solid #f1b44c;border-radius:24px;padding:18px;text-align:center;margin:14px 0;position:relative;overflow:hidden}
.volleyNet{height:4px;background:#fff;margin:18px 0;border-radius:99px;box-shadow:0 0 0 2px rgba(0,0,0,.06)}
.ball{font-size:52px;animation:bob 1.1s infinite alternate ease-in-out}
@keyframes bob{from{transform:translateY(0)}to{transform:translateY(-9px)}}
.toast{border-radius:16px;padding:12px 14px;background:#eef7ff;font-weight:900;margin:10px 0}
.toast.good{background:#e4fff1;color:#087a35}.toast.bad{background:#fff0f0;color:#a51e24}

.versionBadgeFixed{position:fixed;right:8px;bottom:72px;z-index:999;background:#092942;color:white;border-radius:999px;padding:5px 9px;font-size:11px;font-weight:900;opacity:.86}

.listenPrompt{border:2px dashed var(--line);border-radius:18px;padding:18px;text-align:center;background:#fbfefe;margin:12px 0}
.listenPrompt .ear{font-size:42px}

.historyItem{border:1px solid var(--line);border-radius:18px;padding:14px;margin:10px 0;background:#fff}
.historyItem.win{background:#effff9;border-color:#9be8df}
.historyGrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.reviewRow{border-bottom:1px solid var(--line);padding:10px 0}
.reviewRow:last-child{border-bottom:0}
</style>

async function initFirebase(){
 try {
   fbApp = initializeApp(firebaseConfig);
   auth = getAuth(fbApp);
   db = getFirestore(fbApp);
   authUser = await new Promise((resolve, reject)=>{
     const off = onAuthStateChanged(auth, user=>{ if(user){ off(); resolve(user); } });
     signInAnonymously(auth).catch(reject);
   });
   firebaseConnected = true;
 } catch(e) {
   lastError = "Firebase init/auth failed: " + e.message;
 }
}

async function connectFamily(){
 if(!firebaseConnected || !state.familyId) return;
 try {
   const ref = familyRef();
   const snap = await getDoc(ref);
   if(!snap.exists()) {
     await setDoc(ref, {
       familyId: state.familyId,
       players: state.players,
       progress: {},
       settings: state.settings,
       test: {createdBy: state.devicePlayer, createdAt: Date.now()},
       updatedAt: serverTimestamp()
     }, {merge:true});
   }
   if(unsub) unsub();
   unsub = onSnapshot(ref, snap => {
     if(!snap.exists()) return;
     const data = snap.data();
     state.progress = data.progress || {};
     state.settings = data.settings || state.settings;
     state.players = data.players || state.players;
     lastSnapshot = new Date().toLocaleTimeString();
     saveLocal();
     render();
   }, err => {
     lastError = "Firestore listener failed: " + err.message;
     render();
   });
 } catch(e) {
   lastError = "Connect family failed: " + e.message;
   render();
 }
}

function saveLocal(){
 localStorage.setItem(LS.family, state.familyId);
 localStorage.setItem(LS.player, state.devicePlayer);
 localStorage.setItem(LS.players, JSON.stringify(state.players));

async function writeCloud(extra={}){
 saveLocal();
 if(!firebaseConnected || !state.familyId) {
   lastError = "Not connected to Firebase.";
   render(); return;
 }
 try {
   await setDoc(familyRef(), {
     familyId: state.familyId,
     players: state.players,
     progress: state.progress,
     settings: state.settings,
     lastWriter: state.devicePlayer,
     lastWriteAt: Date.now(),
     ...extra,
     updatedAt: serverTimestamp()
   }, {merge:true});
   lastWrite = new Date().toLocaleTimeString();
   lastError = "";
 } catch(e) {
   lastError = "Cloud write failed: " + e.message;
   alert(lastError);
 }
 render();
}

function seededRandom(seed){
  let x = Math.sin(seed) * 10000;
  return x - Math.floor(x);
}
function seededShuffle(arr, seed){
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(seededRandom(seed + i * 17) * (i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}
function getHappyDeck(gameNumber){
  return seededShuffle(PHRASES, Number(gameNumber) || 1).slice(0, 40);
}
function getHappyOptions(correct, gameNumber, index){
  const others = PHRASES.filter(x=>x.id!==correct.id);
  const shuffled = seededShuffle(others, (Number(gameNumber)||1)*1000 + index*31);
  const opts = shuffled.slice(0,3);
  opts.push(correct);
  return seededShuffle(opts, (Number(gameNumber)||1)*2000 + index*47);
}

 const p1 = state.players[1] || "Liz";
 const current = v.turn % 2 === 0 ? p0 : p1;
 const currentLabel = current.toLowerCase().includes("liz") ? "Liz" : current;
 const p1Label = p1.toLowerCase().includes("liz") ? "Liz" : p1;
 return `<section class="card">
   <div class="gameHero">
     <h2>🏐 Beach Volleyball</h2>
     <p class="small">Same-device starter mode. Pass the phone back and forth. First to 11 wins.</p>
     <div class="scoreboard">
       <div class="scoreCard ${v.hilton>v.liz?'leading':''}"><h3>${esc(p0)}</h3><div class="bigScore">${v.hilton}</div></div>
       <div class="scoreCard ${v.liz>v.hilton?'leading':''}"><h3>${esc(p1Label)}</h3><div class="bigScore">${v.liz}</div></div>
     </div>
   </div>
   ${v.winner ? `
     <div class="volleyCourt"><div class="ball">🏆</div><h2>${esc(v.winner)} wins!</h2><p class="small">Beach fireworks. Parrot dances. Rematch?</p></div>
     <button class="primary" id="startVolley">Play again</button>
     <button class="primary orange" id="backGames">Back to games</button>
   ` : `
     <div class="volleyCourt"><div>🌊 🌴 🦜</div><div class="ball">🏐</div><div class="volleyNet"></div><h3>${esc(currentLabel)}'s rally</h3></div>
     <h3>How do you say this in Spanish?</h3>
     <div class="en">${esc(state.game.current.english)}</div>
     ${state.game.message ? `<div class="toast ${state.game.message.includes("Point")?'good':'bad'}">${esc(state.game.message)}</div>` : ""}
     ${state.game.options.map(o=>`<button class="gameChoice" data-volley-answer="${o.id}" data-current="${esc(current)}">${esc(o.spanish)}</button>`).join("")}
   `}
 </section>`;
}
async function answerVolley(id,current){
 const v = state.game.volleyball;
 const p0 = state.players[0] || "Hilton";
 const p1 = state.players[1] || "Liz";
 const correct = Number(id)===state.game.current.id;
 const isP0 = current===p0;
 if(correct){
   if(isP0) v.hilton++; else v.liz++;
   state.game.message = "Point for " + current + "!";
   await mark(state.game.current.id, current);
 } else {
   if(isP0) v.liz++; else v.hilton++;
   state.game.message = "Missed! Point to the other side. Answer: " + state.game.current.spanish;
 }
 if(v.hilton>=11 || v.liz>=11){
   v.winner = v.hilton>v.liz ? p0 : p1;
   state.game.active=false;
 } else {
   v.turn++;
   newGameQuestion();
 }
 render();
}

function bind(){
 document.querySelectorAll("[data-tab]").forEach(b=>b.onclick=()=>{state.tab=b.dataset.tab; saveLocal(); render();});
 document.querySelectorAll("[data-speak]").forEach(b=>b.onclick=e=>{e.stopPropagation(); const ph=PHRASES.find(x=>x.id==b.dataset.speak); if(ph) speak(ph.spanish);});
 document.querySelectorAll("[data-toggle]").forEach(b=>b.onclick=e=>{e.stopPropagation(); toggle(b.dataset.toggle,b.dataset.player);});
 document.querySelectorAll("[data-mark]").forEach(b=>b.onclick=e=>{e.stopPropagation(); mark(b.dataset.mark,b.dataset.player);});


 const night=document.getElementById("night"); if(night) night.onchange=async()=>{state.settings.currentNight=Number(night.value); await writeCloud();};
 const start=document.getElementById("startQuiz"); if(start) start.onclick=startQuiz;
 const search=document.getElementById("search"); if(search) search.oninput=()=>{state.search=search.value; render();};
 document.querySelectorAll("[data-answer]").forEach(b=>b.onclick=async ()=>{
 if(state.quiz.answered) return;
 const ph=nightly()[state.quiz.index];
 state.quiz.answered=true;
 state.quiz.correct=Number(b.dataset.answer)===ph.id;
 if(state.quiz.correct){
   state.quiz.score++;
   await autoMarkCurrentDevice(ph.id);
 } else {
   render();
 }
});
 const next=document.getElementById("next"); if(next) next.onclick=()=>{state.quiz.index++; if(state.quiz.index>=5){state.quiz.active=false; state.tab="progress";} else {state.quiz.answered=false; state.quiz.correct=false; state.quiz.options=makeOptions(nightly()[state.quiz.index],nightly());} render();};
 const test=document.getElementById("testSync"); if(test) test.onclick=async()=>{ await writeCloud({testSync: {from: state.devicePlayer, at: Date.now(), random: Math.random()}}); };
const openHappy=document.getElementById("openHappy"); if(openHappy) openHappy.onclick=()=>{state.game.mode="happySetup"; render();};
const startHappy=document.getElementById("startHappy"); if(startHappy) startHappy.onclick=()=>startHappyHour(state.game.happyGameNumber || 1);
const openVolley=document.getElementById("openVolley"); if(openVolley) openVolley.onclick=startVolleyball;
const startVolley=document.getElementById("startVolley"); if(startVolley) startVolley.onclick=startVolleyball;
const backGames=document.getElementById("backGames"); if(backGames) backGames.onclick=()=>{state.game.mode=null; state.game.active=false; state.tab="games"; render();};


const startHappyFromNumber=document.getElementById("startHappyFromNumber"); if(startHappyFromNumber) startHappyFromNumber.onclick=()=>{ const n=Number(document.getElementById("happyGameNumberInput").value || 1); state.game.happyGameNumber=n; startHappyHour(n); };
document.querySelectorAll("[data-replay-game]").forEach(b=>b.onclick=()=>startHappyHour(Number(b.dataset.replayGame || 1)));

const openHistory=document.getElementById("openHistory"); if(openHistory) openHistory.onclick=async()=>{state.game.mode="history"; state.game.selectedGame=null; await loadGameHistory(); render();};
const openHistoryAfterGame=document.getElementById("openHistoryAfterGame"); if(openHistoryAfterGame) openHistoryAfterGame.onclick=()=>window.caboOpenGameHistory();
document.querySelectorAll("[data-game-detail]").forEach(b=>b.onclick=()=>{state.game.selectedGame=Number(b.dataset.gameDetail); render();});
const backHistory=document.getElementById("backHistory"); if(backHistory) backHistory.onclick=()=>{state.game.selectedGame=null; render();};
document.querySelectorAll("[data-speak-text]").forEach(b=>b.onclick=()=>speak(b.dataset.speakText));

document.querySelectorAll("[data-happy-answer]").forEach(b=>b.onclick=()=>answerHappy(b.dataset.happyAnswer));
document.querySelectorAll("[data-volley-answer]").forEach(b=>b.onclick=()=>answerVolley(b.dataset.volleyAnswer,b.dataset.current));
}
await initFirebase();
if(state.familyId && state.devicePlayer) await connectFamily();
render();
</script>
</body>
</html>
